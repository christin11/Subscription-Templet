# ==========================================================
# 修复说明：
# 1. 修复了 rule-providers 缺失 type: http 的问题（通过正确引用锚点）。
# 2. 统一了策略组和规则集中的 Emoji/特殊字符引用。
# 3. 保持了你要求的 DNS 和 分流规则结构。
# ==========================================================

proxy-providers:
  Airport:
    type: http
    interval: 1800
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: "🟢 直连"
    url: "{{url}}"

global-ua: clash

port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
ipv6: false
allow-lan: true
unified-delay: true
tcp-concurrent: true

geodata-mode: false
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 48
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"

external-controller: 0.0.0.0:9090
secret: ""
external-ui: ui

find-process-mode: strict
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 30

profile:
  store-selected: true
  store-fake-ip: true
  # 在这里固定你的配置显示名称
  name: "🚀 My_Ultimate_Profile"

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - "+.apple.com"

tun:
  enable: true
  stack: mixed
  mtu: 9000
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.arpa"
    - "time.*.com"
    - "ntp.*.com"
    - "+.market.xiaomi.com"
    - "localhost.ptlogin2.qq.com"
    - "*.msftncsi.com"
    - "www.msftconnecttest.com"
    - "+.stun.*.*"
    - "+.msftconnecttest.com"
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5
  nameserver:
    - 119.29.29.29
    - 223.5.5.5
  nameserver-policy:
    'geosite:cn':
      - 119.29.29.29
      - 223.5.5.5
    'geosite:geolocation-!cn':
      - 'tls://1.0.0.1:853'
      - 'tls://dns.google:853'
  proxy-server-nameserver:
    - 119.29.29.29
    - 223.5.5.5

proxies:
  - name: "🟢 直连"
    type: direct
    udp: true

# YAML 锚点
pr: &pr
  type: select
  proxies: ["✨ 节点选择", "🚀 手动切换", "♻️ 自动选择", "🇭🇰 香港节点", "🇹🇼 台湾节点", "🇯🇵 日本节点", "🇰🇷 韩国节点", "🇸🇬 新加坡节点", "🇹🇭 泰国节点", "🇺🇸 美国节点", "🇩🇪 德国节点", "🇬🇧 英国节点", "🟢 直连"]

# 策略组
proxy-groups:
  - name: "✨ 节点选择"
    type: select
    proxies: ["🚀 手动切换", "♻️ 自动选择", "🇭🇰 香港节点", "🇹🇼 台湾节点", "🇯🇵 日本节点", "🇰🇷 韩国节点", "🇸🇬 新加坡节点", "🇹🇭 泰国节点", "🇺🇸 美国节点", "🇩🇪 德国节点", "🇬🇧 英国节点", "🟢 直连"]

  - name: "🚀 手动切换"
    type: select
    include-all: true  # 自动包含所有节点，用于手动选点
    filter: '^((?!直连).)*$' # 过滤掉包含“直连”字样的节点（可选）

  - name: "♻️ 自动选择"
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: '^((?!直连).)*$'
    url: "https://www.gstatic.com/generate_204"

  - {name: "⏱️ 网络测速", !!merge <<: *pr}
  - {name: "🔍 谷歌服务", !!merge <<: *pr}
  - {name: "Ⓜ️ 微软服务", !!merge <<: *pr}
  - {name: "🍎 苹果服务", !!merge <<: *pr}
  - {name: "📰 苹果新闻", !!merge <<: *pr}
  - {name: "🪙 贝宝支付", !!merge <<: *pr}
  - {name: "🤖️ 人工智能", !!merge <<: *pr}
  - {name: "📤 Line消息", !!merge <<: *pr}
  - {name: "📱 电报消息", !!merge <<: *pr}
  - {name: "🐦 Discord消息", !!merge <<: *pr}
  - {name: "👤 脸书消息", !!merge <<: *pr}
  - {name: "📄 推特消息", !!merge <<: *pr}
  - {name: "📖 红迪消息", !!merge <<: *pr}
  - {name: "🫟 TikTok", !!merge <<: *pr}
  - {name: "🎻 Spotify", !!merge <<: *pr}
  - {name: "🎹 JOOX", !!merge <<: *pr}
  - {name: "🎷 Deezer", !!merge <<: *pr}
  - {name: "📹 油管视频", !!merge <<: *pr}
  - {name: "🎥 奈飞视频", !!merge <<: *pr}
  - {name: "🎬 迪士尼+", !!merge <<: *pr}
  - {name: "🎬 HBO视频", !!merge <<: *pr}
  - {name: "📀 亚马逊服务", !!merge <<: *pr}
  - {name: "🗼 BBC", !!merge <<: *pr}
  - {name: "🏟️ DAZN", !!merge <<: *pr}
  - {name: "🎞️ ViuTV", !!merge <<: *pr}
  - {name: "🖼️ AbemaTV", !!merge <<: *pr}
  - {name: "📽 巴哈姆特", !!merge <<: *pr}
  - {name: "🍿 境外媒体", !!merge <<: *pr}
  - {name: "🍔 国内媒体", type: select, proxies: ["🟢 直连", "✨ 节点选择"]}
  - {name: "📽 哔哩哔哩", type: select, proxies: ["🟢 直连", "✨ 节点选择"]}
