# 规则锚点定义
rule-anchor:
  ip: &ip {type: http, interval: 259200, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 259200, behavior: domain, format: mrs}
  qcy: &qcy {type: http, interval: 259200, behavior: domain, format: text}
  class: &class {type: http, interval: 259200, behavior: classical, format: text}

