# ========== 规则提供者 ==========
# 使用远程规则列表（需要启用的时候替换为相应的规则）
rule-providers: {}

# ========== 规则集 ==========
rules:
  # 规则优先级从上到下排列
  - GEOIP,CN,🌐 全球直连
  - MATCH,🌍 兜底分流

# ========== 使用说明 ==========
# 1. 在 proxies 部分添加你的代理服务器
# 2. 可选：配置 rule-providers 以使用远程规则列表
# 3. 根据需要修改规则列表中的代理组分配
# 4. 使用 Clash 或兼容客户端导入此配置
