# --- 地区节点分组 ---
🇭🇰 香港节点 = select, policy-path={{url}}, filter-regex=(?i)🇭🇰|香港|港|\bHK\b|Hong
🇹🇼 台湾节点 = select, policy-path={{url}}, filter-regex=(?i)🇹🇼|台湾|台灣|台|\bTW\b|Taiwan
🇯🇵 日本节点 = select, policy-path={{url}}, filter-regex=(?i)🇯🇵|日本|东京|東京|\bJP\b|Japan
🇰🇷 韩国节点 = select, policy-path={{url}}, filter-regex=(?i)🇰🇷|韩|韓|首尔|\bKR\b|Korea
🇸🇬 新加坡节点 = select, policy-path={{url}}, filter-regex=(?i)🇸🇬|新加坡|狮|狮城|獅|獅城|\bSG\b|Singapore
🇹🇭 泰国节点 = select, policy-path={{url}}, filter-regex=(?i)🇹🇭|泰国|泰國|曼谷|\bTH\b|Thailand
🇺🇸 美国节点 = select, policy-path={{url}}, filter-regex=(?i)🇺🇸|美国|洛杉矶|圣何塞|US|(?:States|America)
🇩🇪 德国节点 = select, policy-path={{url}}, filter-regex=(?i)🇩🇪|德国|德國|DEU|慕尼黑|汉堡|科隆|(?:Germany)
🇬🇧 英国节点 = select, policy-path={{url}}, filter-regex=(?i)🇬🇧|英国|英國|GBR|\\b(UK|United Kingdom|Kingdom|KINDOM)\\b|^((?!(烏克蘭|乌克兰|🇺🇦|UKR)).)*$

