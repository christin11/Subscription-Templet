[General]
# --- 基础连接设置 ---
# 端口设置 [cite: 1]
http-port = 7890
socks-port = 7891
# 允许局域网访问 [cite: 1]
allow-lan = true
# 延迟计算优化 [cite: 1]
unified-delay = true
# IPv6 开关 [cite: 1, 3]
ipv6 = false

# --- 外部控制与脚本 ---
external-controller = 0.0.0.0:9090
# 对应 Clash 的 global-ua [cite: 1]
global-ua = surfboard

# --- DNS 设置 ---
# 对应 dns.enable: true [cite: 2]
dns-server = 223.5.5.5, 119.29.29.29, system
# 对应 enhanced-mode: fake-ip [cite: 3]
address = /manual-fake-ip-range/198.18.0.1/16
# 排除机场域名及内网域名防止死锁 [cite: 3]
skip-proxy = *.jytergdf.org, blog.jytergdf.org, doh.pub, dns.alidns.com, dns.google, *.lan, *.local, +.stun.*.*, +.stun.*.*.*, +.msftncsi.com, +.msftconnecttest.com, +.push.apple.com, Mijia Cloud, dlg.io.mi.com, +.apple.com

# --- 嗅探与流量控制 ---
# 对应 sniffer.enable [cite: 2]
sniff-tls = true

[Proxy]
# 静态直连节点 [cite: 4, 5]
🟢 直连 = direct, udp-relay=true

[Proxy Group]
# 节点选择主组 [cite: 5]
✨ 节点选择 = select, 🚀 手动切换, ♻️ 自动选择, 🇭🇰 香港节点, 🇹🇼 台湾节点, 🇯🇵 日本节点, 🇰🇷 韩国节点, 🇸🇬 新加坡节点, 🇹🇭 泰国节点, 🇺🇸 美国节点, 🇩🇪 德国节点, 🇬🇧 英国节点, 🟢 直连

# 自动选择组：去掉 URL 这里的引号，并确保参数顺序
♻️ 自动选择 = url-test, policy-path={{url}}, url=https://www.gstatic.com/generate_204, interval=300, tolerance=50, filter-regex=^((?!直连).)*$

# 手动切换组：同样去掉正则的引号
🚀 手动切换 = select, policy-path={{url}}, filter-regex=^((?!直连).)*$

# --- 业务分流组 ---
# 使用与 Clash 模板一致的逻辑转换 [cite: 6, 7, 8, 9, 10]
⏱️ 网络测速 = select, ✨ 节点选择, 🚀 手动切换, ♻️ 自动选择, 🇭🇰 香港节点, 🇹🇼 台湾节点, 🇯🇵 日本节点, 🇰🇷 韩国节点, 🇸🇬 新加坡节点, 🇹🇭 泰国节点, 🇺🇸 美国节点, 🇩🇪 德国节点, 🇬🇧 英国节点, 🟢 直连
🔍 谷歌服务 = select, ✨ 节点选择, 🚀 手动切换, ♻️ 自动选择, 🇭🇰 香港节点, 🇹🇼 台湾节点, 🇯🇵 日本节点, 🇰🇷 韩国节点, 🇸🇬 新加坡节点, 🇹🇭 泰国节点, 🇺🇸 美国节点, 🇩🇪 德国节点, 🇬🇧 英国节点, 🟢 直连
