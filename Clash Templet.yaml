 proxy-providers:
  AirPort: 
    type: http
    interval: 1800
    health-check:
      enable: true
      url: https://www.epochtimes.com/
      interval: 300
    proxy: "🟢 直连"
    url: "{{url}}"

global-ua: clash

port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
ipv6: false
allow-lan: true
unified-delay: true
tcp-concurrent: true

geodata-mode: false
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 48
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"

external-controller: 0.0.0.0:9090
secret: ""
external-ui: ui

find-process-mode: strict
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 30

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - "+.apple.com"

tun:
  enable: true
  stack: mixed
  mtu: 9000
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true

  # 默认 DNS，用于解析加密 DNS 的域名
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 核心 Fake-IP 过滤：将机场域名强制排除，防止死锁
  fake-ip-filter:
    - '*.jytergdf.org'
    - 'blog.jytergdf.org'
    - 'doh.pub'
    - 'dns.alidns.com'
    - 'dns.google'
    - '*.lan'
    - '*.local'
    - '+.stun.*.*'
    - '+.stun.*.*.*'
    - '+.msftncsi.com'
    - '+.msftconnecttest.com'
    - '+.push.apple.com'

  # 主 DNS：采用机场推荐的 IP 格式 DoH
  nameserver:
    - 'https://119.29.29.29/dns-query'
    - 'https://223.5.5.5/dns-query'
    - '223.5.5.5'

  # 修正后的策略分流：每个冒号后都严格检查了空格，并对 Key 加上了双引号
  nameserver-policy:
    "geosite:cn": "119.29.29.29"
    "+.google.com": "https://dns.cloudflare.com/dns-query"
    "+.googleapis.com": "https://dns.cloudflare.com/dns-query"
    "+.youtube.com": "https://dns.cloudflare.com/dns-query"
    "+.facebook.com": "https://dns.cloudflare.com/dns-query"
    "+.twitter.com": "https://dns.cloudflare.com/dns-query"
    "+.github.com": "https://dns.cloudflare.com/dns-query"

  # 备用/污染判定
  fallback-filter:
    geoip: true
    geoip-code: "CN"
    ipcidr:
      - 240.0.0.0/4

proxies:
  - name: "🟢 直连"
    type: direct
    udp: true

# YAML 锚点
pr: &pr
  type: select
  proxies: ["✨ 节点选择", "🚀 手动切换", "♻️ 自动选择", "🇭🇰 香港节点", "🇹🇼 台湾节点", "🇯🇵 日本节点", "🇰🇷 韩国节点", "🇸🇬 新加坡节点", "🇹🇭 泰国节点", "🇺🇸 美国节点", "🇩🇪 德国节点", "🇬🇧 英国节点", "🟢 直连"]

